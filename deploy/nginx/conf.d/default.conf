# ===========================================================================
# 小善学习站 — Nginx 站点配置
# TLS 终止 + 反向代理(/api → backend、/pinpin/ → pinpin) + 静态托管(主站 / 拼读)
#
# 证书:把 fullchain.pem 与 privkey.pem 放到 deploy/certs/(容器内 /etc/nginx/certs)。
# ===========================================================================

# ---- 上游(compose 服务名,内部网络解析) ----
upstream backend_upstream {
    server backend:4000;
}
upstream pinpin_upstream {
    server pinpin:3000;
}

# WebSocket 升级所需的 Connection 头映射(Next.js 开发/HMR、长连接场景)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# HTTP :80 —— ACME 验证 + 强制跳转 HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name look3.cn www.look3.cn s.look3.cn;

    # 可选:Let's Encrypt webroot 验证(certbot --webroot -w /var/www/certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余一律 301 跳转到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS :443 —— 主站点
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name look3.cn www.look3.cn;

    # ---- TLS 证书 ----
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ---- 现代 TLS 设置 ----
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ---- 安全响应头 ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 拼读与 PinPin 与主站同源,故 SAMEORIGIN 不影响内嵌 iframe
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- 站点根 ----
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # 注册/上传体积上限(主站为轻量请求)
    client_max_body_size 2m;

    # ---- gzip ----
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # -----------------------------------------------------------------------
    # /api/ → 后端。注意:不带末尾路径的 proxy_pass 会保留完整 URI,
    # 因此 /api/health 原样转发为 /api/health(后端路由本就挂在 /api 下)。
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # /pinpin/ → PinPin。同样保留 /pinpin/ 前缀(Next 以 basePath=/pinpin 构建)。
    # 携带 Upgrade/Connection 头以支持 WebSocket。
    # -----------------------------------------------------------------------
    location = /pinpin {
        return 301 /pinpin/;
    }
    location /pinpin/ {
        proxy_pass http://pinpin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    # -----------------------------------------------------------------------
    # /apps/phonics/ → 自然拼读静态目录(含中文文件名,UTF-8 路径可直接服务)。
    # 媒体较大,适当放宽并设缓存。
    # -----------------------------------------------------------------------
    # 用 location ^~ 前缀匹配 + alias,避免与下方正则 location 冲突;
    # 不嵌套正则,规避 alias+正则的路径拼接陷阱。媒体与 HTML 统一短缓存,
    # 既能正常更新闪卡 HTML,也能缓存音视频静态资源。
    location ^~ /apps/phonics/ {
        alias /usr/share/nginx/html/apps/phonics/;
        location ~ \.html$ { expires off; add_header Cache-Control "no-cache, must-revalidate" always; }
        sendfile on;       # 拼读视频较大,启用高效发送
        tcp_nopush on;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }



    # -----------------------------------------------------------------------
    # /assets/ → 主站静态资源,长缓存。
    # -----------------------------------------------------------------------
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # -----------------------------------------------------------------------
    # / → 主页面。找不到文件时回退到 index.html。
    # -----------------------------------------------------------------------
    # HTML 文档不长缓存：任何页面更新对所有用户即时生效（静态资源 js/css/mp3 仍可缓存）
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ---------------------------------------------------------------------------
# HTTPS :443 —— s.look3.cn 「单词速刷 · 手机版」独立站点
# root = /usr/share/nginx/html/m(挂载自 vendor/CoCaWordCards/mobile)
# 词包 /packs、音频 /audio 复用桌面版同一份文件(bind mount 到 /m 下),同源免 CORS。
# /api 反代后端(埋点 track.js)。精确 server_name 优先于主站的多域块。
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name s.look3.cn;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /usr/share/nginx/html/m;
    index index.html;
    charset utf-8;
    client_max_body_size 2m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # /api → 后端(埋点上报 / track.js)
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 词包:JSON/JS 短缓存(带 ?d= 版本号,更新即时生效)
    location /packs/ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # 真人发音:长缓存(带 ?n= 版本号)
    location /audio/ {
        sendfile on;
        tcp_nopush on;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # HTML 不长缓存,页面更新即时生效
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
