<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>高考英语作文 · 逐句背诵</title>
<style>
:root{
  --color-paper:#fcfaf4; --color-surface:#fff; --color-ink:#362c24;
  --color-ink-soft:#71675d; --color-ink-dim:#a09890;
  --color-accent:#359658; --color-accent-strong:#007c3a; --color-accent-soft:#dcf7e2;
  --color-line:#e5e1da; --color-line-strong:#d2cdc5;
  --radius-sm:.5rem; --radius-md:.875rem; --radius-lg:1.25rem;
  --shadow-nav:0 4px 24px rgba(54,44,36,.08);
  --shadow-card:0 1px 2px rgba(54,44,36,.05),0 8px 24px rgba(54,44,36,.06);
  --shadow-modal:0 8px 48px rgba(54,44,36,.18);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
  background:var(--color-paper);color:var(--color-ink);line-height:1.7;
  font-size:16px;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:900px;margin:0 auto;padding:24px clamp(.9rem,3vw,1.5rem) 4rem;}

/* ---------- Header ---------- */
.site-head{text-align:center;margin-bottom:1.4rem;}
.brand{font-size:.85rem;font-weight:600;letter-spacing:.04em;color:var(--color-accent-strong);
  display:inline-flex;align-items:center;gap:.4rem;background:var(--color-accent-soft);
  padding:.3rem .8rem;border-radius:999px;}
.site-title{font-size:clamp(1.5rem,5vw,2.3rem);font-weight:800;margin:.7rem 0 .3rem;letter-spacing:-.01em;}
.site-sub{color:var(--color-ink-soft);font-size:.92rem;margin:0;}

/* ---------- Toolbar ---------- */
.toolbar{background:var(--color-surface);border:1px solid var(--color-line);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);padding:1rem;margin-bottom:1.4rem;
  display:flex;flex-wrap:wrap;gap:.9rem 1.1rem;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:.3rem;flex:1 1 240px;min-width:200px;}
.field label,.ctrl-group .lbl{font-size:.7rem;font-weight:700;color:var(--color-ink-dim);letter-spacing:.06em;text-transform:uppercase;}
.select{appearance:none;width:100%;font-family:inherit;font-size:1rem;font-weight:600;color:var(--color-ink);
  background:var(--color-paper);border:1.5px solid var(--color-line-strong);border-radius:var(--radius-md);
  padding:.65rem 2.4rem .65rem .9rem;cursor:pointer;transition:border-color .2s var(--ease-out);
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23359658' stroke-width='3' stroke-linecap='round'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right .9rem center;}
.select:focus{outline:none;border-color:var(--color-accent);}
.ctrl-group{display:flex;flex-direction:column;gap:.3rem;}
.seg{display:inline-flex;background:var(--color-paper);border:1.5px solid var(--color-line-strong);
  border-radius:var(--radius-md);padding:.2rem;gap:.2rem;}
.seg button{font-family:inherit;font-size:.85rem;font-weight:600;color:var(--color-ink-soft);
  background:transparent;border:none;border-radius:.6rem;padding:.42rem .8rem;cursor:pointer;
  transition:all .2s var(--ease-out);white-space:nowrap;}
.seg button.active{background:var(--color-accent);color:#fff;box-shadow:0 2px 6px rgba(53,150,88,.3);}
.btn{font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;border-radius:var(--radius-md);
  padding:.5rem .85rem;transition:all .2s var(--ease-out);border:1.5px solid var(--color-accent);
  background:var(--color-accent);color:#fff;white-space:nowrap;}
.btn:hover{background:var(--color-accent-strong);border-color:var(--color-accent-strong);}
.btn.ghost{background:transparent;color:var(--color-accent-strong);}
.btn.ghost:hover{background:var(--color-accent-soft);}
.btn.off{background:transparent;color:var(--color-ink-soft);border-color:var(--color-line-strong);}
.btn.disabled,label.btn.disabled{opacity:.5;pointer-events:none;}
.btn[disabled]{opacity:.5;pointer-events:none;cursor:not-allowed;}

/* ---------- Top tabs (3-tab layout) ---------- */
.toptabs{display:inline-flex;justify-content:flex-start;gap:6px;align-self:flex-start;
  background:var(--color-surface);border:1px solid var(--color-line);border-radius:999px;
  box-shadow:0 1px 2px rgba(54,44,36,.04),0 6px 16px rgba(54,44,36,.05);
  padding:6px;margin-bottom:1.1rem;margin-left:0;margin-right:0;}
.toptabs button{flex:0 0 auto;appearance:none;font-family:inherit;font-size:.95rem;font-weight:700;
  color:var(--color-ink-soft);background:transparent;border:none;border-radius:999px;
  padding:.5rem 1.15rem;cursor:pointer;white-space:nowrap;
  transition:background .22s ease,color .22s ease;}
.toptabs button:hover{background:var(--color-accent-soft);color:var(--color-accent-strong);}
.toptabs button.active{background:var(--color-accent);color:#fff;}

/* ---------- Zero-shake panel host (grid stacking) ---------- */
.panel-host{display:grid;align-items:start;}
.panel{grid-area:1/1;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s ease;}
.panel.show{opacity:1;visibility:visible;pointer-events:auto;}

/* ---------- Library panels (public / mine) ---------- */
.lib{background:var(--color-surface);border:1px solid var(--color-line);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);padding:clamp(1rem,3vw,1.6rem);}
.lib-head{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;margin-bottom:.8rem;}
.lib-title{font-size:1.15rem;font-weight:800;margin:0;}
.lib-head .btn{margin-left:auto;}
.lib-note{background:var(--color-accent-soft);color:var(--color-accent-strong);font-size:.82rem;line-height:1.55;
  border-radius:var(--radius-md);padding:.55rem .8rem;margin-bottom:.8rem;}
.lib-search{width:100%;font-family:inherit;font-size:.95rem;color:var(--color-ink);background:var(--color-paper);
  border:1.5px solid var(--color-line-strong);border-radius:var(--radius-md);padding:.6rem .8rem;margin-bottom:.9rem;}
.lib-search:focus{outline:none;border-color:var(--color-accent);}
.lib-hint{padding:1.4rem .6rem;font-size:.92rem;color:var(--color-ink-dim);text-align:center;line-height:1.7;}

.grp{margin-bottom:.5rem;border:1px solid var(--color-line);border-radius:var(--radius-md);overflow:hidden;}
.grp-head{display:flex;align-items:center;gap:.5rem;width:100%;font-family:inherit;font-size:.84rem;
  font-weight:800;letter-spacing:.04em;color:var(--color-ink);background:var(--color-paper);
  border:none;padding:.65rem .8rem;cursor:pointer;text-align:left;transition:background .15s var(--ease-out);}
.grp-head:hover{background:var(--color-accent-soft);}
.grp-arrow{display:inline-block;transition:transform .18s var(--ease-out);font-size:.78rem;color:var(--color-accent);}
.grp.collapsed .grp-arrow{transform:rotate(-90deg);}
.grp-count{margin-left:auto;font-weight:700;color:var(--color-ink-dim);font-size:.8rem;}
.grp.collapsed .grp-items{display:none;}
.grp-items{padding:.3rem;display:flex;flex-direction:column;gap:.3rem;}
/* 合集卡：复用 .grp 外观，头部为「可点击展开的标题按钮 + 卡片级操作按钮」 */
.coll-card{border-color:var(--color-accent);}
.coll-head{display:flex;align-items:center;gap:.5rem;padding:.5rem .7rem;background:var(--color-accent-soft);}
.coll-toggle{flex:1 1 auto;display:flex;align-items:center;gap:.5rem;min-width:0;
  font-family:inherit;font-weight:800;letter-spacing:.03em;color:var(--color-ink);
  background:none;border:none;padding:.15rem 0;cursor:pointer;text-align:left;}
.coll-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.92rem;}
.coll-acts{flex:0 0 auto;display:flex;gap:.35rem;flex-wrap:wrap;}
.coll-card.collapsed .coll-items{display:none;}

.litem{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
  background:var(--color-surface);border:1px solid var(--color-line);border-radius:var(--radius-md);
  padding:.55rem .7rem;}
.litem.selected{border-color:var(--color-accent);background:var(--color-accent-soft);}
.litem-main{flex:1 1 180px;min-width:0;display:flex;flex-direction:column;gap:.15rem;}
.litem-title{font-size:.98rem;font-weight:700;color:var(--color-ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.litem-prompt{font-size:.78rem;color:var(--color-ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.litem-acts{flex:0 0 auto;display:flex;gap:.35rem;flex-wrap:wrap;}
.litem-acts .btn{font-size:.8rem;padding:.38rem .7rem;}
.litem-acts .btn.tiny{font-size:.76rem;padding:.32rem .55rem;}
.lib-empty{padding:1rem .6rem;font-size:.88rem;color:var(--color-ink-dim);text-align:center;}

/* ---------- 作文考题 block ---------- */
.art-del{margin-left:.6rem;font-size:.78rem;padding:.3rem .6rem;}
.art-prompt{display:flex;flex-direction:column;gap:.35rem;background:var(--color-paper);
  border:1px solid var(--color-line);border-left:3px solid var(--color-accent);border-radius:var(--radius-md);
  padding:.7rem .9rem;margin:.6rem 0 .2rem;}
.art-prompt-tag{align-self:flex-start;font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--color-accent-strong);background:var(--color-accent-soft);padding:.16rem .5rem;border-radius:999px;}
.art-prompt-text{margin:0;font-size:.95rem;line-height:1.6;color:var(--color-ink-soft);white-space:pre-wrap;}

/* ---------- Upload modal ---------- */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:var(--color-overlay,rgba(54,44,36,.4));
  display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay[hidden]{display:none;}
.modal-card{width:min(520px,100%);max-height:90vh;overflow-y:auto;background:var(--color-surface);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-modal);display:flex;flex-direction:column;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.3rem .6rem;}
.modal-title{margin:0;font-size:1.2rem;font-weight:800;}
.modal-close{font-size:1.5rem;line-height:1;color:var(--color-ink-dim);background:transparent;border:none;
  cursor:pointer;width:2rem;height:2rem;border-radius:50%;transition:all .18s var(--ease-out);}
.modal-close:hover{background:var(--color-paper);color:var(--color-ink);}
.modal-body{display:flex;flex-direction:column;gap:.95rem;padding:.4rem 1.3rem 1rem;}
.m-field{display:flex;flex-direction:column;gap:.3rem;}
.m-label-row{display:flex;align-items:baseline;justify-content:space-between;}
.m-label{font-size:.74rem;font-weight:800;letter-spacing:.05em;color:var(--color-ink-dim);text-transform:uppercase;}
.m-counter{font-size:.72rem;font-weight:700;color:var(--color-ink-dim);}
.m-input{width:100%;font-family:inherit;font-size:1rem;color:var(--color-ink);background:var(--color-paper);
  border:1.5px solid var(--color-line-strong);border-radius:var(--radius-md);padding:.6rem .8rem;}
.m-input:focus{outline:none;border-color:var(--color-accent);}
.m-area{resize:vertical;min-height:3.2rem;line-height:1.5;font-weight:400;}
.m-select{appearance:none;cursor:pointer;font-weight:600;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23359658' stroke-width='3' stroke-linecap='round'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right .8rem center;padding-right:2.2rem;}
.m-help{font-size:.72rem;color:var(--color-ink-dim);line-height:1.4;}
.m-err{font-size:.82rem;font-weight:600;color:#c0392b;min-height:1em;}
.modal-foot{display:flex;justify-content:flex-end;padding:.6rem 1.3rem 1.2rem;border-top:1px solid var(--color-line);}
.modal-foot .btn{padding:.6rem 1.6rem;}
/* content-type radio group */
.m-radio-row{display:flex;gap:.5rem;}
.m-radio{flex:0 0 auto;display:inline-flex;align-items:center;gap:.35rem;cursor:pointer;font-size:.92rem;font-weight:600;
  color:var(--color-ink-soft);background:var(--color-paper);border:1.5px solid var(--color-line-strong);
  border-radius:var(--radius-md);padding:.5rem .9rem;transition:all .18s var(--ease-out);}
.m-radio input{accent-color:var(--color-accent);margin:0;}
.m-radio:hover{border-color:var(--color-accent);}
/* help (?) icon */
.help-ico{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;width:1.5rem;height:1.5rem;
  margin-left:.4rem;border-radius:50%;border:1.5px solid var(--color-accent);background:transparent;
  color:var(--color-accent-strong);font-size:.82rem;font-weight:800;line-height:1;cursor:pointer;
  transition:all .18s var(--ease-out);}
.help-ico:hover{background:var(--color-accent);color:#fff;}
.help-body{font-size:.92rem;line-height:1.7;color:var(--color-ink-soft);}
.help-body p{margin:0 0 .7rem;}
.help-body p:last-child{margin-bottom:0;}
/* status badges (public list, own items) */
.litem-badge{flex:0 0 auto;font-size:.7rem;font-weight:800;letter-spacing:.02em;padding:.16rem .5rem;border-radius:999px;}
.litem-badge.pending{color:#9a6a00;background:#fff3d6;}
.litem-badge.approved{color:#1f7a3d;background:#dcf7e2;}
.litem-badge.rejected{color:#c0392b;background:#fde2dd;}
.litem-note{flex:1 1 100%;font-size:.74rem;color:var(--color-ink-dim);line-height:1.4;}
/* book pagination */
.bookpager{display:flex;align-items:center;justify-content:center;gap:.8rem;margin:1rem 0 .2rem;}
.bookpager .btn{padding:.45rem 1rem;font-size:.85rem;}
.bookpager-ind{font-size:.85rem;font-weight:700;color:var(--color-ink-soft);}

/* ---------- Toast ---------- */
.toast{position:fixed;left:50%;bottom:2rem;transform:translateX(-50%) translateY(8px);z-index:1200;
  background:var(--color-ink);color:#fff;font-size:.88rem;font-weight:600;padding:.65rem 1.1rem;
  border-radius:999px;box-shadow:var(--shadow-modal);opacity:0;transition:opacity .25s var(--ease-out),transform .25s var(--ease-out);
  max-width:88vw;text-align:center;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- Article card ---------- */
.card{background:var(--color-surface);border:1px solid var(--color-line);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);padding:clamp(1.1rem,3.5vw,2rem);}
.art-head{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap;
  padding-bottom:1rem;margin-bottom:.4rem;border-bottom:2px solid var(--color-accent-soft);}
.art-no{font-size:1.6rem;font-weight:800;color:var(--color-accent);line-height:1;}
.art-title{font-size:clamp(1.15rem,3.5vw,1.5rem);font-weight:800;margin:0;}
.art-count{margin-left:auto;font-size:.8rem;color:var(--color-ink-dim);font-weight:600;}

/* tabs (translation mode) */
.tabs{display:inline-flex;background:var(--color-paper);border:1px solid var(--color-line);
  border-radius:999px;padding:.25rem;gap:.2rem;margin:1rem 0 1.2rem;}
.tabs button{font-family:inherit;font-size:.85rem;font-weight:700;color:var(--color-ink-soft);
  background:transparent;border:none;border-radius:999px;padding:.45rem 1.1rem;cursor:pointer;
  transition:all .2s var(--ease-out);}
.tabs button.active{background:var(--color-accent);color:#fff;}

/* ---------- Sentence ---------- */
.sent{display:flex;gap:.7rem;padding:.85rem 0;border-bottom:1px dashed var(--color-line);align-items:flex-start;}
.sent:last-child{border-bottom:none;}
.sent.playing{background:linear-gradient(90deg,rgba(220,247,226,.4),transparent);border-radius:var(--radius-md);}
.en .word.now{background:#ffd97a;color:var(--color-ink);border-radius:.28rem;box-shadow:0 1px 0 rgba(54,44,36,.08);}
.sent-body{flex:1 1 auto;min-width:0;order:1;}
.sent-ctrl{order:2;flex:0 0 auto;display:flex;flex-direction:column;gap:.35rem;}
.cbtn{width:2.1rem;height:2.1rem;border-radius:.65rem;border:1.5px solid var(--color-line-strong);
  background:var(--color-paper);cursor:pointer;font-size:.9rem;font-weight:800;line-height:1;display:flex;
  align-items:center;justify-content:center;color:var(--color-ink-soft);transition:all .18s var(--ease-out);padding:0;}
.cbtn:hover{border-color:var(--color-accent);}
.cbtn.on{background:var(--color-accent);border-color:var(--color-accent);color:#fff;box-shadow:0 2px 6px rgba(53,150,88,.3);}
.cbtn.play.active{background:var(--color-accent-strong);border-color:var(--color-accent-strong);color:#fff;}
.en-wrap,.zh-wrap{position:relative;}
.en{font-size:1.12rem;letter-spacing:.01em;display:flex;flex-direction:column;gap:.12rem;}
.en-line{position:relative;padding-left:.85rem;line-height:1.75;}
.en-line:before{content:'';position:absolute;left:0;top:.45em;bottom:.45em;width:3px;border-radius:2px;
  background:var(--color-accent-soft);}
.en-line:hover:before{background:var(--color-accent);}
.en .word{cursor:pointer;border-radius:.25rem;padding:0 .04em;transition:background .15s var(--ease-out);}
.en .word:hover{background:var(--color-accent-soft);}
.en .word.lit{background:#ffe08a;}
.mask{position:absolute;inset:-.1em -.3em;display:none;border-radius:var(--radius-sm);}
.mask-en{background:repeating-linear-gradient(45deg,var(--color-accent-soft),var(--color-accent-soft) 10px,#eef7f0 10px,#eef7f0 20px);}
.mask-zh{background:repeating-linear-gradient(45deg,#f1ede4,#f1ede4 10px,#f7f4ed 10px,#f7f4ed 20px);}
.sent.hide-en .en{visibility:hidden;pointer-events:none;}
.sent.hide-en .mask-en{display:block;}
.sent.hide-zh .trans{visibility:hidden;}
.sent.hide-zh .mask-zh{display:block;}
.trans{margin-top:.55rem;}
.trans-literal{display:flex;flex-wrap:wrap;gap:.4rem .5rem;}
.chunk{background:var(--color-accent-soft);color:var(--color-accent-strong);font-size:.92rem;font-weight:600;
  padding:.2rem .6rem;border-radius:999px;}
.trans-normal{color:var(--color-ink-soft);font-size:.98rem;}
body.mode-normal .trans-literal{display:none;}
body.mode-literal .trans-normal{display:none;}

/* ---------- Word popup ---------- */
.pop{position:absolute;z-index:50;background:var(--color-surface);color:var(--color-ink);
  border:1px solid var(--color-line);border-radius:var(--radius-md);
  box-shadow:var(--shadow-modal);padding:.75rem .9rem;max-width:268px;font-size:.9rem;
  opacity:0;transform:translateY(6px) scale(.96);pointer-events:none;transition:all .18s var(--ease-out);}
.pop.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.pop .pw{font-weight:800;font-size:1.1rem;color:var(--color-ink);display:flex;align-items:center;gap:.55rem;margin-bottom:.35rem;}
.pop .pw .spk{cursor:pointer;background:transparent;border:1.5px solid var(--color-line-strong);color:var(--color-accent-strong);
  border-radius:50%;width:1.9rem;height:1.9rem;display:inline-flex;align-items:center;justify-content:center;
  flex:0 0 auto;transition:all .18s var(--ease-out);padding:0;}
.pop .pw .spk svg{width:.95rem;height:.95rem;display:block;fill:currentColor;}
.pop .pw .spk:hover{background:var(--color-accent-soft);}
.pop .pw .spk.on{border-color:var(--color-accent);color:var(--color-accent-strong);}
.pop .pw .spk:active{transform:scale(.92);}
.pop .pmeta{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;margin-bottom:.35rem;}
.pop .pos{color:var(--color-ink-dim);font-size:.82rem;font-weight:600;}
.pop .ipa{color:var(--color-accent-strong);font-size:.95rem;font-family:"Times New Roman",Georgia,serif;}
.pop .pm{color:var(--color-ink);line-height:1.55;}
.pop:after{content:'';position:absolute;bottom:-7px;left:var(--ax,20px);width:13px;height:13px;
  background:var(--color-surface);border-right:1px solid var(--color-line);border-bottom:1px solid var(--color-line);
  transform:rotate(45deg);border-radius:0 0 3px 0;}
.pop.below:after{bottom:auto;top:-7px;border:none;border-left:1px solid var(--color-line);border-top:1px solid var(--color-line);border-radius:3px 0 0 0;}

/* segmentation flat mode (意群划分 关) */
body.noseg .en{display:block;line-height:1.9;}
body.noseg .en .en-line{display:inline;padding-left:0;}
body.noseg .en .en-line:before{display:none;}
body.noseg .en .en-line:not(:last-child):after{content:' ';white-space:pre;}

.speed-group{min-width:160px;}
.speed-range{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:999px;
  background:linear-gradient(90deg,var(--color-accent) 0%,var(--color-accent) 0%,var(--color-line-strong) 0%);
  outline:none;cursor:pointer;margin:.55rem 0 .3rem;}
.speed-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--color-accent);border:2px solid #fff;box-shadow:0 1px 4px rgba(53,150,88,.5);cursor:pointer;}
.speed-range::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--color-accent);
  border:2px solid #fff;box-shadow:0 1px 4px rgba(53,150,88,.5);cursor:pointer;}
#speedVal{color:var(--color-accent-strong);font-weight:800;}

  function detok(tokens,asText){
    const toks=Array.isArray(tokens)?tokens:[];
    const parts=[]; let quoteOpen=false,first=true,prevOpener=false;
    toks.forEach(t=>{
      const w=t.w; let isOpenQuote=false,noSpaceBefore=false;
      if(w==='"'){ if(quoteOpen){noSpaceBefore=true;quoteOpen=false;} else {quoteOpen=true;isOpenQuote=true;} }
      else if(NO_SPACE_BEFORE.test(w)){ noSpaceBefore=true; }
      if(prevOpener) noSpaceBefore=true;
      const space=(!first && !noSpaceBefore)?' ':'';
      parts.push({space,t});
      first=false; prevOpener=isOpenQuote||w==='('||w==='[';
    });
    if(asText) return parts.map(p=>p.space+p.t.w).join('');
    return parts;
  }
  function renderTokensInto(parent,tokens){
    detok(tokens,false).forEach(p=>{
      if(p.space) parent.appendChild(document.createTextNode(' '));
      const t=p.t;
      if(isWordTok(t)){
        const s=document.createElement('span'); s.className='word';
        s.textContent=t.w; s.dataset.w=t.w; s.dataset.m=t.m;
        s.dataset.p=t.p||''; s.dataset.us=t.us||''; s.dataset.uk=t.uk||'';
        parent.appendChild(s);
      } else {
        const s=document.createElement('span'); s.className='punc'; s.textContent=t.w; parent.appendChild(s);
      }
    });
  }
  const norm=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  // group sentence tokens by 意群 (chunks) for line-by-line English display
  function groupByChunks(sentence){
    const toks=Array.isArray(sentence.tokens)?sentence.tokens:[], chunks=sentence.chunks||[];
    if(!chunks.length) return [toks];
    const groups=[]; let ti=0;
    for(let ci=0;ci<chunks.length;ci++){
      const target=norm(chunks[ci].en); const g=[]; let acc='';
      const last=ci===chunks.length-1;
      while(ti<toks.length){
        g.push(toks[ti]); acc+=norm(toks[ti].w); ti++;
        if(!last && acc.length>=target.length) break;
      }
      groups.push(g);
    }
    // any leftover tokens -> append to last group
    while(ti<toks.length){ groups[groups.length-1].push(toks[ti]); ti++; }
    // validity check: combined must equal sentence; else fallback single line
    const flat=groups.reduce((n,g)=>n+g.length,0);
    if(flat!==toks.length) return [toks];
    return groups;
  }
  function buildEn(sentence){
    const en=document.createElement('div'); en.className='en';
    const groups=groupByChunks(sentence);
    groups.forEach(g=>{
      if(!g.length) return;
      const line=document.createElement('div'); line.className='en-line';
      renderTokensInto(line,g);
      en.appendChild(line);
    });
    return en;
  }

  }

  }

    const row=document.createElement('div'); row.className='sent';

  // render a slice of sentences into #sentences and rebuild rows[]

  function renderBookPager(total){

  function normLevel(lv){ return LEVELS.indexOf(lv)>=0?lv:'高中'; }
  function buildItems(){
    const builtin=ESSAYS.map(e=>({key:'b'+e.id,id:e.id,title:e.title||'',prompt:'',level:'高中',essay:e,builtin:true,source:'builtin',isMine:false}));
    // 我的书屋合集 → 展开为可学习的子条目（key: mc<合集id>_<序号>），供 studyItem/键盘切换使用
    const collectionStudy=[];
    myItems.forEach(c=>{
      if(c.contentType!=='collection') return;
      (c.items||[]).forEach((sub,idx)=>{
        if(!sub||!sub.essay) return;
        collectionStudy.push({
          key:'mc'+c.id+'_'+idx, id:c.id, title:sub.title||(sub.essay&&sub.essay.title)||'',
          prompt:sub.prompt||'', level:normLevel(sub.level), essay:sub.essay,
          builtin:false, source:'collection', isMine:true
        });
      });
    });
    // flat my items exclude collections (collections aren't directly studyable as one essay)
    const myFlat=myItems.filter(it=>it.contentType!=='collection');
    // unified lookup table for study + keyboard nav: built-in + public + mine + collection essays
    items=builtin.concat(publicItems).concat(myFlat).concat(collectionStudy);
  }
  function getItem(key){ return items.find(it=>it.key===key)||null; }

  // study a chosen item: render into 当前学习 + remember last view
  function selectItem(key,doRender){
    const it=getItem(key);
    if(!it){ selectedKey=null; return; }
    selectedKey=key;
    try{ localStorage.setItem(LAST_VIEW_KEY, key); }catch(_){}
    if(doRender!==false){
      render(it.essay||{}, it.prompt||'', it.contentType||'composition');
      saveFullStudy(it);
    }
    updateArtDelete();
    markSelected();
  }
  // 把足以直接渲染的整篇内容存进localStorage（新键），普通作文全量、过大内容仅存key
  function saveFullStudy(it){
    try{
      const payload={
        key:it.key, title:it.title||'',
        prompt:it.prompt||'', contentType:it.contentType||'composition',
        essay:it.essay||{}
      };
      const str=JSON.stringify(payload);
      if(str.length>LAST_STUDY_MAX){ localStorage.removeItem(LAST_STUDY_KEY); return; }
      localStorage.setItem(LAST_STUDY_KEY, str);
    }catch(_){ /* 配额异常不得影响页面 */ }
  }
  // 启动/重载时优先据整篇缓存直接渲染当前学习，不依赖 loadPublic/loadMine
  function restoreFullStudy(){
    let raw=null;
    try{ raw=localStorage.getItem(LAST_STUDY_KEY); }catch(_){ return false; }
    if(!raw) return false;
    try{
      const p=JSON.parse(raw);
      if(!p||!p.essay) return false;
      selectedKey=p.key||null;
      render(p.essay, p.prompt||'', p.contentType||'composition');
      restoredFromFull=true;
      updateArtDelete();
      markSelected();
      return true;
    }catch(_){ return false; }
  }
  // study item + switch to 当前学习 tab (used by 「学习」 buttons)
  function studyItem(key){ selectItem(key); switchTab('study'); }
  function markSelected(){
    document.querySelectorAll('.litem').forEach(el=>{
      el.classList.toggle('selected',el.dataset.key===selectedKey);
    });
  }

  function updateArtDelete(){
    // 当前学习 inline delete only applies to a studied 我的作文 copy
    const it=getItem(selectedKey);
    const canDel=!!(it && it.source==='mine' && authToken && apiBase);
    artDel.hidden=!canDel;
  }

  // ---------- tabs ----------
  let curTab='study';
  function switchTab(tab){
    curTab=tab;
    Array.prototype.forEach.call(topTabs.querySelectorAll('button'),b=>{
      b.classList.toggle('active',b.dataset.tab===tab);
    });
    Object.keys(panels).forEach(k=>{ panels[k].classList.toggle('show',k===tab); });
  }
  topTabs.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b)return;
    switchTab(b.dataset.tab);
  });

  // ---------- collapsible grouped list (shared component) ----------
  // renders `list` into `host`, grouped by level, filtered by `q`, using `collapsedMap` for per-group state.
  // `actionsFor(it)` returns array of {label, cls, fn} buttons. `loginHint` shown when provided.
  function renderGroupedList(host,list,q,collapsedMap,actionsFor){
    host.innerHTML='';
    const ql=(q||'').trim().toLowerCase();
    const byLevel={}; LEVELS.forEach(l=>byLevel[l]=[]);
    list.forEach(it=>{ byLevel[normLevel(it.level)].push(it); });
    let anyShown=false;
    LEVELS.forEach(level=>{
      let arr=byLevel[level];
      if(ql){
        arr=arr.filter(it=>(it.title||'').toLowerCase().includes(ql) || (it.prompt||'').toLowerCase().includes(ql));
        if(!arr.length) return;
      }
      if(!arr.length) return;
      anyShown=true;
      const group=document.createElement('div'); group.className='grp';
      const isCollapsed=!ql && collapsedMap[level]===true;
      if(isCollapsed) group.classList.add('collapsed');
      const head=document.createElement('button');
      head.type='button'; head.className='grp-head';
      const arrow=document.createElement('span'); arrow.className='grp-arrow'; arrow.textContent='▾';
      const name=document.createElement('span'); name.textContent=level;
      const count=document.createElement('span'); count.className='grp-count'; count.textContent=String(arr.length);
      head.appendChild(arrow); head.appendChild(name); head.appendChild(count);
      // toggle ONLY this group; flip the class in place, no full host rebuild, no list collapse
      head.addEventListener('click',()=>{
        const now=!group.classList.contains('collapsed');
        collapsedMap[level]=now;
        group.classList.toggle('collapsed',now);
      });
      group.appendChild(head);
      const itemsWrap=document.createElement('div'); itemsWrap.className='grp-items';
      arr.forEach(it=>{ itemsWrap.appendChild(buildLItem(it,actionsFor)); });
      group.appendChild(itemsWrap);
      host.appendChild(group);
    });
    if(!anyShown){
      const empty=document.createElement('div'); empty.className='lib-empty';
      empty.textContent=ql?'没有匹配的作文':'暂无作文';
      host.appendChild(empty);
    }
  }
  function buildLItem(it,actionsFor){
    const row=document.createElement('div'); row.className='litem'; row.dataset.key=it.key;
    if(it.key===selectedKey) row.classList.add('selected');
    const main=document.createElement('div'); main.className='litem-main';
    const t=document.createElement('div'); t.className='litem-title'; t.textContent=it.title||'未命名';
    main.appendChild(t);
    if(it.prompt){ const pr=document.createElement('div'); pr.className='litem-prompt'; pr.textContent=it.prompt; main.appendChild(pr); }
    row.appendChild(main);
    // status badge: only for own items in 公共资源 (T8)
    if(it.source==='public' && it.isMine===true && it.status){
      const badge=document.createElement('span');
      const map={pending:'审核中',approved:'已通过',rejected:'已拒绝'};
      badge.className='litem-badge '+it.status;
      badge.textContent=map[it.status]||it.status;
      row.appendChild(badge);
    }
    const acts=document.createElement('div'); acts.className='litem-acts';
    (actionsFor(it)||[]).forEach(a=>{
      const b=document.createElement('button'); b.type='button';
      b.className='btn '+(a.cls||''); b.textContent=a.label;
      if(a.disabled){ b.disabled=true; }
      else { b.addEventListener('click',ev=>{ ev.stopPropagation(); a.fn(); }); }
      acts.appendChild(b);
    });
    row.appendChild(acts);
    // review note line (T8): rejected items with notes
    if(it.source==='public' && it.isMine===true && it.status==='rejected' && it.review_notes){
      const note=document.createElement('div'); note.className='litem-note';
      note.textContent='审核意见：'+it.review_notes;
      row.appendChild(note);
    }
    return row;
  }

  // ---------- 合集卡（可展开 + 卡片级操作） ----------
  // subItems: [{key?,title,prompt,essay,...}]，每篇有「学习」按钮（studyFn(sub)）
  // headerActions: [{label,cls,fn,disabled}] 卡片级按钮（如收藏/取消收藏）
  // collapseKey: 用 collapsedMap 记忆折叠态
  function buildCollectionCard(opts){
    const {title,subItems,headerActions,collapsed,onToggle,studyFn}=opts;
    const card=document.createElement('div'); card.className='grp coll-card';
    if(collapsed) card.classList.add('collapsed');
    const head=document.createElement('div'); head.className='grp-head coll-head';
    const toggle=document.createElement('button'); toggle.type='button'; toggle.className='coll-toggle';
    const arrow=document.createElement('span'); arrow.className='grp-arrow'; arrow.textContent='▾';
    const name=document.createElement('span'); name.className='coll-name'; name.textContent=title;
    const count=document.createElement('span'); count.className='grp-count'; count.textContent=String(subItems.length)+'篇';
    toggle.appendChild(arrow); toggle.appendChild(name); toggle.appendChild(count);
    toggle.addEventListener('click',()=>{ const now=!card.classList.contains('collapsed'); card.classList.toggle('collapsed',now); if(onToggle)onToggle(now); });
    head.appendChild(toggle);
    if(headerActions&&headerActions.length){
      const acts=document.createElement('div'); acts.className='coll-acts';
      headerActions.forEach(a=>{
        const b=document.createElement('button'); b.type='button'; b.className='btn '+(a.cls||''); b.textContent=a.label;
        if(a.disabled){ b.disabled=true; } else { b.addEventListener('click',ev=>{ ev.stopPropagation(); a.fn(); }); }
        acts.appendChild(b);
      });
      head.appendChild(acts);
    }
    card.appendChild(head);
    const wrap=document.createElement('div'); wrap.className='grp-items coll-items';
    subItems.forEach(sub=>{
      const row=document.createElement('div'); row.className='litem';
      const main=document.createElement('div'); main.className='litem-main';
      const t=document.createElement('div'); t.className='litem-title'; t.textContent=sub.title||(sub.essay&&sub.essay.title)||'未命名';
      main.appendChild(t);
      if(sub.prompt){ const pr=document.createElement('div'); pr.className='litem-prompt'; pr.textContent=sub.prompt; main.appendChild(pr); }
      row.appendChild(main);
      const a=document.createElement('div'); a.className='litem-acts';
      const sb=document.createElement('button'); sb.type='button'; sb.className='btn ghost tiny'; sb.textContent='学习';
      sb.addEventListener('click',ev=>{ ev.stopPropagation(); studyFn(sub); });
      a.appendChild(sb); row.appendChild(a);
      wrap.appendChild(row);
    });
    card.appendChild(wrap);
    return card;
  }

  // ---------- 公共资源 list ----------
  function renderPublicList(){
    if(!pubList) return;
    pubList.innerHTML='';
    // 内置范文合集卡（始终展示；高中范文不再逐篇罗列）
    const builtinSubs=items.filter(it=>it.builtin);
    const collActions=authToken
      ? [ collectionCollected
          ? {label:'✓ 已收藏',cls:'off tiny',disabled:true}
          : {label:'收藏到我的书屋',cls:'tiny',fn:saveCollection} ]
      : [];
    pubList.appendChild(buildCollectionCard({
      title:BUILTIN_COLLECTION_TITLE,
      subItems:builtinSubs,
      headerActions:collActions,
      collapsed:collapsedPub.__coll===true,
      onToggle:(c)=>{ collapsedPub.__coll=c; },
      studyFn:(sub)=>studyItem(sub.key)
    }));
    if(!authToken){
      const hint=document.createElement('div'); hint.className='lib-hint';
      hint.textContent='登录后查看大家分享的作文、收藏到我的书屋';
      pubList.appendChild(hint);
      return;
    }
    // 其它学段/用户上传的公开文章（非内置）仍按学段分组展示
    const others=document.createElement('div');
    renderGroupedList(others,items.filter(it=>it.source==='public'),pubSearch.value,collapsedPub,it=>{
      const acts=[ {label:'学习',cls:'ghost tiny',fn:()=>studyItem(it.key)} ];
      if(collectedSourceIds.has(String(it.id))){
        acts.push({label:'✓ 已收藏',cls:'off tiny',disabled:true});
      } else {
        acts.push({label:'收藏到我的书屋',cls:'tiny',fn:()=>resaveToMine(it.id)});
      }
      if(it.isMine===true) acts.push({label:'删除',cls:'off tiny',fn:()=>deletePublic(it)});
      return acts;
    });
    while(others.firstChild) pubList.appendChild(others.firstChild);
  }
  pubSearch.addEventListener('input',renderPublicList);

  // ---------- 收藏内置范文合集（整体收藏成一条） ----------
  async function saveCollection(){
    if(!authToken||!apiBase){ showToast('请先登录后使用'); return; }
    try{
      const payload={ contentType:'collection', title:BUILTIN_COLLECTION_TITLE,
        items:ESSAYS.map(e=>({title:e.title||'',prompt:'',level:'高中',essay:e})) };
      const r=await fetch(apiBase+'/my',{method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},
        body:JSON.stringify(payload)});
      if(r.status===409){ collectionCollected=true; renderPublicList(); showToast('已收藏'); return; }
      if(!r.ok){ showToast(r.status===401?'请先登录':'收藏失败'); return; }
      collectionCollected=true;
      await loadMine();
      renderPublicList();
      showToast('已收藏到我的书屋');
    }catch(_){ showToast('收藏失败'); }
  }

  // ---------- 我的作文 list ----------
  function renderMineList(){
    if(!mineList) return;
    if(!authToken){
      mineList.innerHTML='';
      const hint=document.createElement('div'); hint.className='lib-hint';
      hint.textContent='登录后使用我的书屋';
      mineList.appendChild(hint);
      return;
    }
    mineList.innerHTML='';
    // 合集条目（可展开，逐篇学习；卡片级取消收藏）
    const collections=myItems.filter(it=>it.contentType==='collection');
    collections.forEach(c=>{
      mineList.appendChild(buildCollectionCard({
        title:c.title||BUILTIN_COLLECTION_TITLE,
        subItems:(c.items||[]).map((sub,idx)=>({title:sub.title,prompt:sub.prompt,essay:sub.essay,key:'mc'+c.id+'_'+idx})),
        headerActions:[{label:'取消收藏',cls:'off tiny',fn:()=>deleteMine(c)}],
        collapsed:collapsedMine['__coll_'+c.id]===true,
        onToggle:(col)=>{ collapsedMine['__coll_'+c.id]=col; },
        studyFn:(sub)=>studyItem(sub.key)
      }));
    });
    // 普通文章（按学段分组）
    const flat=myItems.filter(it=>it.contentType!=='collection');
    const host=document.createElement('div');
    renderGroupedList(host,flat,mineSearch.value,collapsedMine,it=>{
      // collected (sourceId non-empty) → read-only: 取消收藏 + 学习
      if(it.sourceId){
        return [
          {label:'学习',cls:'ghost tiny',fn:()=>studyItem(it.key)},
          {label:'取消收藏',cls:'off tiny',fn:()=>deleteMine(it)}
        ];
      }
      // manual-new → 编辑 / 删除 / 学习
      return [
        {label:'学习',cls:'ghost tiny',fn:()=>studyItem(it.key)},
        {label:'编辑',cls:'tiny',fn:()=>openModalEdit(it)},
        {label:'删除',cls:'off tiny',fn:()=>deleteMine(it)}
      ];
    });
    // 只有在有普通文章时才并入分组结果，避免合集存在时出现多余的「暂无作文」空态
    if(flat.length){ while(host.firstChild) mineList.appendChild(host.firstChild); }
    else if(!collections.length){ while(host.firstChild) mineList.appendChild(host.firstChild); }
  }
  mineSearch.addEventListener('input',renderMineList);

  // ---------- 转存 (re-save public → mine) ----------
  async function resaveToMine(sourceId){
    if(!authToken||!apiBase){ showToast('请先登录后使用'); return; }
    try{
      const r=await fetch(apiBase+'/my',{method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},
        body:JSON.stringify({sourceId})});
      if(r.status===409){
        // already collected: mark in set + disable button, then notify
        collectedSourceIds.add(String(sourceId));
        renderPublicList();
        showToast('已收藏');
        return;
      }
      if(!r.ok){ showToast(r.status===401?'请先登录':'收藏失败'); return; }
      collectedSourceIds.add(String(sourceId));
      await loadMine();
      renderPublicList();
      showToast('已收藏到我的书屋');
    }catch(_){ showToast('收藏失败'); }
  }

  // ---------- delete public (owner of own public article) ----------
  async function deletePublic(it){
    if(!authToken||!apiBase){ showToast('请先登录后使用'); return; }
    if(!confirm('确定删除这篇公共作文？此操作不可恢复。')) return;
    try{
      const r=await fetch(apiBase+'/articles/'+it.id,{method:'DELETE',headers:{'Authorization':'Bearer '+authToken}});
      if(!r.ok){ showToast(r.status===404?'无权删除':'删除失败'); return; }
      publicItems=publicItems.filter(x=>x.key!==it.key);
      buildItems();
      if(selectedKey===it.key){ selectedKey=null; selectLastOrFirst(); }
      renderPublicList(); updateArtDelete(); markSelected();
      showToast('已删除');
    }catch(_){ showToast('删除失败'); }
  }

  // ---------- delete mine ----------
  async function deleteMine(it){
    if(!authToken||!apiBase){ showToast('请先登录后使用'); return; }
    const isColl=it.contentType==='collection';
    const msg=isColl?'确定取消收藏这个合集？':(it.sourceId?'确定取消收藏这篇内容？':'确定删除这篇内容？此操作不可恢复。');
    if(!confirm(msg)) return;
    try{
      const r=await fetch(apiBase+'/my/'+it.id,{method:'DELETE',headers:{'Authorization':'Bearer '+authToken}});
      if(!r.ok){ showToast('删除失败'); return; }
      myItems=myItems.filter(x=>x.key!==it.key);
      // if this was a collected copy, free its source id so it can be collected again
      if(it.sourceId){ collectedSourceIds.delete(String(it.sourceId)); }
      // 取消收藏内置范文合集 → 允许再次收藏
      if(isColl && it.title===BUILTIN_COLLECTION_TITLE){ collectionCollected=false; }
      buildItems();
      // 学习中的条目（含合集子篇 mc<id>_*）被删除 → 重选
      if(selectedKey===it.key || (isColl && selectedKey && selectedKey.indexOf('mc'+it.id+'_')===0)){
        selectedKey=null; selectLastOrFirst();
      }
      renderMineList(); renderPublicList(); updateArtDelete(); markSelected();
      showToast(isColl?'已取消收藏':(it.sourceId?'已取消收藏':'已删除'));
    }catch(_){ showToast('删除失败'); }
  }
  artDel.addEventListener('click',()=>{
    const it=getItem(selectedKey);
    if(it && it.source==='mine') deleteMine(it);
  });

  function selectFirst(){
    if(items.length){ selectItem(items[0].key); }
    else { render({},''); }
  }
  function selectLastOrFirst(){
    let last=null;
    try{ last=localStorage.getItem(LAST_VIEW_KEY); }catch(_){}
    if(last && getItem(last)){ selectItem(last); return; }
    selectFirst();
  }

  // ---------- upload / edit modal ----------
  const MODAL_TITLES={ public:'资料上传', mineNew:'新建', mineEdit:'编辑我的内容' };
  const MAX_BOOK_CHARS=200000;
  // toggle composition/book fields inside the modal
  function applyModalContentType(ct){
    modalContentType=(ct==='book')?'book':'composition';
    const isBook=modalContentType==='book';
    if(mPromptField) mPromptField.hidden=isBook;
    if(mLevelField) mLevelField.hidden=isBook;
    if(mBookLevelField) mBookLevelField.hidden=!isBook;
    if(mTextLabel) mTextLabel.textContent=isBook?'书籍内容':'作文内容';
    if(mTextHint) mTextHint.textContent=isBook?'≤20万字符，超出自动截断':'≤3000 字，超出自动截断';
    if(mText) mText.placeholder=isBook?'粘贴英文书籍内容…':'粘贴英文作文…';
  }
  function getModalContentType(){
    const c=document.querySelector('input[name="mContentType"]:checked');
    return (c&&c.value==='book')?'book':'composition';
  }
  function setModalContentTypeRadio(ct){
    const target=(ct==='book')?'book':'composition';
    document.querySelectorAll('input[name="mContentType"]').forEach(r=>{ r.checked=(r.value===target); });
    applyModalContentType(target);
  }
  function fillModal(it){
    mTitle.value=it?(it.title||''):'';
    mPrompt.value=it?(it.prompt||''):'';
    mText.value=it?(it.text||''):'';
    mLevel.value=it?(it.level||''):'';
    if(mBookLevel) mBookLevel.value=it?(it.bookLevel||''):'';
    mErr.textContent=''; mTitleCount.textContent=(mTitle.value.length)+'/40';
    mSubmit.disabled=false; mSubmit.textContent='提交';
  }
  function openModalCommon(){
    upModalTitle.textContent=MODAL_TITLES[modalMode]||'内容';
    upModal.hidden=false;
    setTimeout(()=>{ try{ mTitle.focus(); }catch(_){} },0);
  }
  function openModalPublic(){
    if(!authToken){ showToast('请先登录后使用'); return; }
    modalMode='public'; editingMyId=null; fillModal(null);
    mTypeFieldEnabled(true); setModalContentTypeRadio('composition'); openModalCommon();
  }
  function openModalMineNew(){
    if(!authToken){ showToast('请先登录后使用'); return; }
    modalMode='mineNew'; editingMyId=null; fillModal(null);
    mTypeFieldEnabled(true); setModalContentTypeRadio('composition'); openModalCommon();
  }
  function openModalEdit(it){
    if(!authToken){ showToast('请先登录后使用'); return; }
    modalMode='mineEdit'; editingMyId=it.id;
    fillModal({title:it.title,prompt:it.prompt,text:essayToText(it.essay),level:it.level,bookLevel:it.bookLevel});
    // content type fixed to the item's own type while editing
    mTypeFieldEnabled(false);
    setModalContentTypeRadio(it.contentType==='book'?'book':'composition');
    openModalCommon();
  }
  // show/hide the content-type chooser (hidden when editing a fixed-type item)
  const mTypeField=document.getElementById('mTypeField');
  function mTypeFieldEnabled(on){ if(mTypeField) mTypeField.hidden=!on; return on; }
  // reconstruct editable plain text from a stored essay (best effort)
  function essayToText(essay){
    const ss=essay&&Array.isArray(essay.sentences)?essay.sentences:[];
    return ss.map(s=>detok(Array.isArray(s.tokens)?s.tokens:[],true)).join(' ');
  }
  function closeModal(){ upModal.hidden=true; }
  btnUploadPublic.addEventListener('click',openModalPublic);
  btnNewMine.addEventListener('click',openModalMineNew);
  mClose.addEventListener('click',closeModal);
  // content-type radio change
  document.querySelectorAll('input[name="mContentType"]').forEach(r=>{
    r.addEventListener('change',()=>{ applyModalContentType(getModalContentType()); });
  });
  // drag-safe close: only close when BOTH mousedown AND click happened on the overlay itself
  let upMouseDownTarget=null;
  upModal.addEventListener('mousedown',e=>{ upMouseDownTarget=e.target; });
  upModal.addEventListener('click',e=>{
    if(e.target===upModal && upMouseDownTarget===upModal) closeModal();
    upMouseDownTarget=null;
  });
  mTitle.addEventListener('input',()=>{ mTitleCount.textContent=(mTitle.value.length)+'/40'; });

  mSubmit.addEventListener('click',async()=>{
    const contentType=getModalContentType();
    const isBook=contentType==='book';
    const title=mTitle.value.trim();
    const prompt=mPrompt.value.trim();
    const level=mLevel.value;
    const bookLevel=mBookLevel?mBookLevel.value:'';

  // ---- audio: word ----
  const PLAY_SVG='<svg viewBox="0 0 24 24"><path d="M8 5.5c0-.8.86-1.3 1.54-.9l9 6.5c.6.43.6 1.37 0 1.8l-9 6.5c-.68.4-1.54-.1-1.54-.9z"/></svg>';
  const PAUSE_SVG='<svg viewBox="0 0 24 24"><rect x="6.5" y="5" width="3.8" height="14" rx="1.2"/><rect x="13.7" y="5" width="3.8" height="14" rx="1.2"/></svg>';
  let voices=[];
  function loadVoices(){voices=window.speechSynthesis?speechSynthesis.getVoices():[];}
  if(window.speechSynthesis){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
  function pickVoice(lang){return voices.find(v=>v.lang===lang)||voices.find(v=>v.lang&&v.lang.replace('_','-').startsWith(lang))||voices.find(v=>v.lang&&v.lang.startsWith('en'));}
  function tts(text,onend,spans){
    if(!window.speechSynthesis){if(onend)onend();return;}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const lang=accent==='uk'?'en-GB':'en-US'; u.lang=lang; u.rate=Math.max(.1,Math.min(10,.92*speed));
    const v=pickVoice(lang); if(v)u.voice=v;
    if(hlOn&&spans&&spans.length){
      const offs=[]; let pos=0;
      for(const s of spans){const w=s.dataset.w||''; let idx=text.indexOf(w,pos); if(idx<0)idx=pos; offs.push(idx); pos=idx+w.length;}
      const hl=mkHL(spans);
      u.onboundary=e=>{ if(e.name&&e.name!=='word')return; const ci=e.charIndex; let k=-1; for(let j=0;j<offs.length;j++){if(offs[j]<=ci)k=j;else break;} if(k>=0)hl(k); };
    }
    u.onend=()=>{ if(spans)spans.forEach(s=>s.classList.remove('now')); if(onend)onend(); };
    speechSynthesis.speak(u);
  }
  // per-word highlight helpers
  function clearWordHL(){document.querySelectorAll('.en .word.now').forEach(s=>s.classList.remove('now'));}
  function mkHL(spans){let last=-1;return k=>{ if(k===last)return; if(last>=0&&spans[last])spans[last].classList.remove('now'); if(k>=0&&spans[k])spans[k].classList.add('now'); last=k; };}
  // per-word audio source builders, tried in order (CoCa real-voice → local → TTS fallback)
  function wordAudioUrls(word){
    const enc=encodeURIComponent(word);
    return [
      '../CoCaWordCards/audio/'+accent+'/'+enc+'.mp3', // CoCa real-voice library (relative to this html)
      'audio/'+accent+'/'+enc+'.mp3'                    // existing local audio
    ];
  }
  // 同一时间只允许一个声音：每次发声前先停掉一切正在播放的音频，并用 token 让旧的回退级联失效。
  let wordPlayToken=0;
  // stop EVERYTHING audible right now: sentence audio, word audio/loop, TTS.
  function stopAllAudio(){
    wordPlayToken++; // invalidate any in-flight word fallback cascade (old onerror chains no-op)
    stopWordLoop();  // clears wordAudio + cancels speechSynthesis + resets loop btn
    if(typeof curAudio!=='undefined' && curAudio){
      curAudio.onended=null;curAudio.onerror=null;curAudio.onplaying=null;curAudio.ontimeupdate=null;
      curAudio.pause();curAudio=null;
    }
    if(window.speechSynthesis)speechSynthesis.cancel();
  }
  // play one word through the fallback cascade; calls tts() if every audio source fails.
  // Stops any previous sound first so only one voice plays at a time.
  function speakWord(word){
    stopAllAudio();
    const myToken=wordPlayToken;
    const urls=wordAudioUrls(word);
    let i=0, done=false;
    const tryNext=()=>{
      if(done || myToken!==wordPlayToken) return; // superseded by a newer click → abort
      if(i>=urls.length){ done=true; tts(word); return; }
      const a=new Audio(urls[i++]); wordAudio=a; a.playbackRate=speed;
      a.onerror=()=>{ if(!done && myToken===wordPlayToken) tryNext(); };
      a.play().catch(()=>{ if(!done && myToken===wordPlayToken) tryNext(); });
    };
    tryNext();
  }
  // ---- word loop: keeps repeating the word until stopped / page blur ----
  let wordLoop=false, wordAudio=null, wordBtn=null, wordW=null;
  function stopWordLoop(){
    wordLoop=false;
    if(wordAudio){wordAudio.onended=null;wordAudio.onerror=null;wordAudio.loop=false;wordAudio.pause();wordAudio=null;}
    if(window.speechSynthesis)speechSynthesis.cancel();

  }
  function startWordLoop(word,btn){
    stopPlay(); stopWordLoop();
    if(typeof wordPlayToken!=='undefined') wordPlayToken++; // supersede any one-shot speakWord cascade
    wordLoop=true; wordW=word; wordBtn=btn; btn.innerHTML=PAUSE_SVG; btn.classList.add('on');
    const urls=wordAudioUrls(word);
    const ttsLoop=()=>{ if(!wordLoop)return; tts(word,()=>{ if(wordLoop) setTimeout(ttsLoop,260); }); };
    let i=0;
    const tryNext=()=>{
      if(!wordLoop) return;
      if(i>=urls.length){ wordAudio=null; ttsLoop(); return; }
      const a=new Audio(urls[i++]); wordAudio=a; a.loop=true; a.playbackRate=speed;
      a.onerror=()=>{ if(!wordLoop) return; tryNext(); };

    };

  // align edge-tts WordBoundary entries to our token spans -> per-span [start,end] interval (media seconds)
  function alignIntervals(spans,tim){
    const iv=new Array(spans.length).fill(null);
    let bi=0;
    for(let si=0;si<spans.length;si++){
      if(bi>=tim.length)break;
      let s=tim[bi].t, e=tim[bi].t+(tim[bi].d||0);
      let need=norm(spans[si].dataset.w), have=norm(tim[bi].w);
      while(have.length<need.length && bi+1<tim.length){ bi++; have+=norm(tim[bi].w); e=tim[bi].t+(tim[bi].d||0); }
      iv[si]={s,e};
      bi++;
    }
    return iv;
  }
  function propFrac(spans){
    const weights=spans.map(s=>Math.max(2,(s.dataset.w||'').length));
    const total=weights.reduce((x,y)=>x+y,0)||1;
    const frac=[]; let acc=0; for(const w of weights){frac.push(acc/total);acc+=w;} frac.push(1);
    return frac;
  }
  // precise per-word highlight: word lights exactly during its [start,end] and clears in the gaps
  let hlRAF=0, hlCtx=null;
  function stopHL(){ if(hlRAF){cancelAnimationFrame(hlRAF);hlRAF=0;} }
  function hlTick(){
    const c=hlCtx;
    if(!c){hlRAF=0;return;}
    const a=c.a;
    if(!a||a.paused||a.ended){hlRAF=0;return;}
    const t=a.currentTime; let k=-1;
    if(c.iv){
      for(let j=0;j<c.iv.length;j++){ const v=c.iv[j]; if(v && t>=v.s && t<v.e){ k=j; break; } }
    } else if(c.frac){
      const d=a.duration; if(d&&isFinite(d)){ const f=t/d; k=0; while(k+1<c.spans.length && f>=c.frac[k+1]) k++; }
    }
    c.hl(k);
    hlRAF=requestAnimationFrame(hlTick);
  }
  function startHLctx(){ if(!hlOn||!hlCtx)return; stopHL(); hlRAF=requestAnimationFrame(hlTick); }
  function clearHLctx(){ stopHL(); if(hlCtx){ hlCtx.spans.forEach(s=>s.classList.remove('now')); } hlCtx=null; }
  function stopPlay(){playing=false;curIdx=-1;mode=null;clearHLctx();if(curAudio){curAudio.onended=null;curAudio.onerror=null;curAudio.onplaying=null;curAudio.ontimeupdate=null;curAudio.pause();curAudio=null;}if(window.speechSynthesis)speechSynthesis.cancel();clearWordHL();clearPlayUI();playAllBtn.textContent='▶ 朗读';}
  function playClip(url,text,onend,spans,tim){
    clearHLctx();
    if(curAudio){curAudio.onended=null;curAudio.onerror=null;curAudio.onplaying=null;curAudio.ontimeupdate=null;curAudio.pause();curAudio=null;}
    const a=new Audio(url); curAudio=a; a.playbackRate=speed; let fell=false, armed=false;
    const fb=()=>{if(fell)return;fell=true;if(curAudio===a)curAudio=null;tts(text,onend,spans);};
    if(spans&&spans.length){
      const base={a,spans,hl:mkHL(spans)};
      if(tim&&tim.length) base.iv=alignIntervals(spans,tim); else base.frac=propFrac(spans);
      const arm=()=>{ if(armed||curAudio!==a)return; armed=true; hlCtx=base; startHLctx(); };
      a.onplaying=arm;                 // primary trigger
      a.ontimeupdate=()=>{ if(!armed) arm(); };  // backup trigger
    }
    a.onended=()=>{clearHLctx();if(curAudio===a)curAudio=null;if(spans)spans.forEach(s=>s.classList.remove('now'));if(onend)onend();};
    a.onerror=fb;
    a.play().catch(fb);
  }
  function speakIdx(i){
    if(!playing)return;

  }

  function hidePop(){stopWordLoop();pop.classList.remove('show');if(activeWord){activeWord.classList.remove('lit');activeWord=null;}}
  cont.addEventListener('click',e=>{const sp=e.target.closest('.word');if(sp){e.stopPropagation();showPop(sp);}});
  document.addEventListener('click',e=>{if(!e.target.closest('.pop')&&!e.target.closest('.word'))hidePop();});
  window.addEventListener('scroll',hidePop,{passive:true});

  document.addEventListener('keydown',e=>{
    if(!upModal.hidden){ if(e.key==='Escape') closeModal(); return; }
    const ae=document.activeElement;
    if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT'))return;
    if(curTab!=='study') return; // arrow nav only while studying
    if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
      if(!items.length) return;
      let i=items.findIndex(it=>it.key===selectedKey); if(i<0)i=0;
      if(e.key==='ArrowRight')i=(i+1)%items.length;
      else i=(i-1+items.length)%items.length;
      selectItem(items[i].key);
    }
  });

  buildItems();
  applyAuthState();
  // 先据整篇缓存直接渲染上次学习那篇（不依赖公共/我的异步加载）；无缓存才回退
  if(!restoreFullStudy() && !getItem(selectedKey)) selectLastOrFirst();
  switchTab('study');
  try{ window.parent.postMessage({type:'composition-ready'},'*'); }catch(_){}
})();
</script>
